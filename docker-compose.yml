services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: sipra
      POSTGRES_USER: sipra
      POSTGRES_PASSWORD: sipra_secret
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sipra -d sipra"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    environment:
      DB_PROVIDER: postgres
      DATABASE_URL: postgresql://sipra:sipra_secret@db:5432/sipra
      DEBUG: ${DEBUG:-0}
      SECRET_KEY: ${SECRET_KEY:-cambiar-en-produccion-clave-secreta-larga}
      ALLOWED_HOSTS: ${ALLOWED_HOSTS:-*}
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "80:80"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  postgres_data:
