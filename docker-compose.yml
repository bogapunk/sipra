services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB_NAME:-sipra}
      POSTGRES_USER: ${POSTGRES_DB_USER:-sipra}
      POSTGRES_PASSWORD: ${POSTGRES_DB_PASSWORD:-sipra_secret}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_DB_USER:-sipra} -d ${POSTGRES_DB_NAME:-sipra}"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    environment:
      DB_PROVIDER: postgres
      DATABASE_URL: ${DATABASE_URL:-postgresql://${POSTGRES_DB_USER:-sipra}:${POSTGRES_DB_PASSWORD:-sipra_secret}@db:${POSTGRES_DB_PORT:-5432}/${POSTGRES_DB_NAME:-sipra}}
      POSTGRES_DB_HOST: db
      POSTGRES_DB_PORT: ${POSTGRES_DB_PORT:-5432}
      POSTGRES_DB_NAME: ${POSTGRES_DB_NAME:-sipra}
      POSTGRES_DB_USER: ${POSTGRES_DB_USER:-sipra}
      POSTGRES_DB_PASSWORD: ${POSTGRES_DB_PASSWORD:-sipra_secret}
      POSTGRES_CONN_MAX_AGE: ${POSTGRES_CONN_MAX_AGE:-600}
      DEBUG: ${DEBUG:-0}
      SECRET_KEY: ${SECRET_KEY:-cambiar-en-produccion-clave-secreta-larga}
      ALLOWED_HOSTS: ${ALLOWED_HOSTS:-*}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  backup:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB_NAME:-sipra}
      POSTGRES_USER: ${POSTGRES_DB_USER:-sipra}
      PGPASSWORD: ${POSTGRES_DB_PASSWORD:-sipra_secret}
      BACKUP_INTERVAL_HOURS: ${BACKUP_INTERVAL_HOURS:-24}
      BACKUP_RETENTION_DAYS: ${BACKUP_RETENTION_DAYS:-14}
    volumes:
      - ./backups:/backups
    depends_on:
      db:
        condition: service_healthy
    command: >
      sh -c "while true; do
        TS=$$(date +%Y%m%d_%H%M%S);
        pg_dump -h db -U $$POSTGRES_USER -d $$POSTGRES_DB -Fc -f /backups/sipra_$$TS.dump &&
        find /backups -type f -name '*.dump' -mtime +$$BACKUP_RETENTION_DAYS -delete;
        sleep $$((BACKUP_INTERVAL_HOURS * 3600));
      done"
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "80:80"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  postgres_data:
