# Ejemplo: NGINX en el servidor Linux (NO dentro de Docker)
# Copiar a /etc/nginx/sites-available/sipra y enlazar en sites-enabled.
# Certificados: usar certbot (Let's Encrypt) o los de la institución.
#
# Flujo: navegador → https://sip.aif.gob.ar:443 → proxy → http://127.0.0.1:8085
# (8085 = puerto publicado por docker-compose.produccion.yml del contenedor frontend)

# Redirección HTTP → HTTPS (opcional pero recomendado)
server {
    listen 80;
    server_name sip.aif.gob.ar;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name sip.aif.gob.ar;

    # ssl_certificate     /etc/letsencrypt/live/sip.aif.gob.ar/fullchain.pem;
    # ssl_certificate_key /etc/letsencrypt/live/sip.aif.gob.ar/privkey.pem;

    client_max_body_size 50M;

    location / {
        proxy_pass http://127.0.0.1:8085;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 90s;
        proxy_send_timeout 90s;
        proxy_read_timeout 90s;
    }
}
