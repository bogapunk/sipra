# Producción: PostgreSQL en la misma red que el backend (puerto 8085)
# Usar con: docker-compose -f docker-compose.produccion.yml up -d
#
# BD interna (por defecto): servicio db en la misma red. Credenciales desde .env.
# BD externa: defina PROD_DATABASE_URL en .env (ej: postgresql://user:pass@10.1.9.194:5432/sipra)
# Postgres en host (puerto 5433): PROD_DATABASE_URL=postgresql://user:pass@host.docker.internal:5433/sipra

services:
  db:
    image: postgres:16-alpine
    networks:
      - sipra_net
    environment:
      POSTGRES_DB: ${POSTGRES_DB_NAME:-sipra}
      POSTGRES_USER: ${POSTGRES_DB_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_DB_PASSWORD:-30153846}
    volumes:
      - postgres_data_prod:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_DB_USER:-postgres} -d ${POSTGRES_DB_NAME:-sipra}"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    networks:
      - sipra_net
    environment:
      DB_PROVIDER: postgres
      # PROD_DATABASE_URL en .env para BD externa; si no: usa db interno
      DATABASE_URL: ${PROD_DATABASE_URL:-postgresql://${POSTGRES_DB_USER:-postgres}:${POSTGRES_DB_PASSWORD:-30153846}@db:5432/${POSTGRES_DB_NAME:-sipra}}
      POSTGRES_DB_HOST: ${PROD_POSTGRES_DB_HOST:-db}
      POSTGRES_DB_PORT: ${POSTGRES_DB_PORT:-5432}
      POSTGRES_DB_NAME: ${POSTGRES_DB_NAME:-sipra}
      POSTGRES_DB_USER: ${POSTGRES_DB_USER:-postgres}
      POSTGRES_DB_PASSWORD: ${POSTGRES_DB_PASSWORD:-30153846}
      DEBUG: "0"
      SECRET_KEY: ${SECRET_KEY:-sipra-produccion-clave-segura-cambiar}
      ALLOWED_HOSTS: ${ALLOWED_HOSTS:-10.1.9.194,localhost,127.0.0.1}
      CORS_ALLOW_ALL_ORIGINS: "0"
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://10.1.9.194:8085,http://localhost:8085,http://127.0.0.1:8085}
      CSRF_TRUSTED_ORIGINS: ${CSRF_TRUSTED_ORIGINS:-http://10.1.9.194:8085,http://localhost:8085,http://127.0.0.1:8085}
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.produccion
    networks:
      - sipra_net
    volumes:
      - ./frontend:/app
    ports:
      - "0.0.0.0:8085:80"  # Escuchar en todas las interfaces
    depends_on:
      - backend
    restart: unless-stopped

networks:
  sipra_net:
    driver: bridge

volumes:
  postgres_data_prod:
