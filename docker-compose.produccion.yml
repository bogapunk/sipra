# Producción: Microsoft SQL Server 2022 (10.1.9.113)
# Frontend Docker escucha en host:8085; delante suele ir NGINX en 443 → proxy a 127.0.0.1:8085
# Dominio público: definir ALLOWED_HOSTS / CORS / CSRF (ej. .env o variables de entorno)
# Usar con: docker-compose -f docker-compose.produccion.yml up -d

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    volumes:
      - sipra_backups:/app/backups
    environment:
      DB_TYPE: mssql
      DB_HOST: 10.1.9.113
      DB_PORT: 1433
      DB_NAME: Sipra
      DB_USER: SA
      DB_PASSWORD: "Davinci2024#"
      DB_ODBC_DRIVER: "ODBC Driver 18 for SQL Server"
      DEBUG: "0"
      SECRET_KEY: ${SECRET_KEY:-sipra-produccion-clave-segura-cambiar}
      ALLOWED_HOSTS: ${ALLOWED_HOSTS:-sip.aif.gob.ar,10.1.9.194,localhost,127.0.0.1}
      CORS_ALLOW_ALL_ORIGINS: "0"
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-https://sip.aif.gob.ar}
      CSRF_TRUSTED_ORIGINS: ${CSRF_TRUSTED_ORIGINS:-https://sip.aif.gob.ar}
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.produccion
    volumes:
      - ./frontend:/app
    ports:
      - "0.0.0.0:8085:80"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  sipra_backups: