# Producción: PostgreSQL en contenedor "postgres" (-p 5433:5432), app en 8085
# Usar con: docker-compose -f docker-compose.produccion.yml up -d
#
# IMPORTANTE: Conectar postgres a la red sipra antes de levantar:
#   docker network connect sipra_default postgres

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    environment:
      DB_PROVIDER: postgres
      DATABASE_URL: "postgresql://admin:qlwpuc%23EEVfs6zY4@postgres:5432/sipra"
      POSTGRES_DB_HOST: postgres
      POSTGRES_DB_PORT: 5432
      POSTGRES_DB_NAME: sipra
      POSTGRES_DB_USER: admin
      POSTGRES_DB_PASSWORD: "qlwpuc#EEVfs6zY4"
      DEBUG: "0"
      SECRET_KEY: ${SECRET_KEY:-sipra-produccion-clave-segura-cambiar}
      ALLOWED_HOSTS: 10.1.9.194,localhost,127.0.0.1
      CORS_ALLOW_ALL_ORIGINS: "0"
      CORS_ALLOWED_ORIGINS: http://10.1.9.194:8085
      CSRF_TRUSTED_ORIGINS: http://10.1.9.194:8085
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.produccion
    volumes:
      - ./frontend:/app
    ports:
      - "0.0.0.0:8085:80"
    depends_on:
      - backend
    restart: unless-stopped
