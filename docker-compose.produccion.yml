# Producción: PostgreSQL en host (puerto 5433), app en puerto 8085
# Usar con: docker-compose -f docker-compose.produccion.yml up -d
#
# BD: PostgreSQL en el host con -p 5433:5432, user admin, pass qlwpuc#EEVfs6zY4
# host.docker.internal permite al backend conectar al host desde Linux

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      DB_PROVIDER: postgres
      DATABASE_URL: "postgresql://admin:qlwpuc%23EEVfs6zY4@host.docker.internal:5433/sipra"
      POSTGRES_DB_HOST: host.docker.internal
      POSTGRES_DB_PORT: 5433
      POSTGRES_DB_NAME: sipra
      POSTGRES_DB_USER: admin
      POSTGRES_DB_PASSWORD: "qlwpuc#EEVfs6zY4"
      DEBUG: "0"
      SECRET_KEY: ${SECRET_KEY:-sipra-produccion-clave-segura-cambiar}
      ALLOWED_HOSTS: 10.1.9.194,localhost,127.0.0.1
      CORS_ALLOW_ALL_ORIGINS: "0"
      CORS_ALLOWED_ORIGINS: http://10.1.9.194:8085
      CSRF_TRUSTED_ORIGINS: http://10.1.9.194:8085
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.produccion
    volumes:
      - ./frontend:/app
    ports:
      - "0.0.0.0:8085:80"
    depends_on:
      - backend
    restart: unless-stopped
