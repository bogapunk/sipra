databases:
  - name: sipra-postgres
    databaseName: sipra
    user: sipra_user
    plan: free

services:
  - type: web
    name: sipra-api
    env: python
    plan: free
    rootDir: backend
    buildCommand: pip install -r requirements.txt && python manage.py migrate
    startCommand: gunicorn config.wsgi:application --bind 0.0.0.0:$PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9
      - key: DEBUG
        value: "0"
      - key: SECRET_KEY
        generateValue: true
      - key: ALLOWED_HOSTS
        value: ".onrender.com"
      - key: CORS_ALLOWED_ORIGINS
        value: "https://sipra-web.onrender.com"
      - key: MEDIA_ROOT
        value: /var/data/media
      - key: DATABASE_URL
        fromDatabase:
          name: sipra-postgres
          property: connectionString
    disk:
      name: media-disk
      mountPath: /var/data
      sizeGB: 1

  - type: static
    name: sipra-web
    rootDir: frontend
    buildCommand: npm ci && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_API_BASE_URL
        value: https://sipra-api.onrender.com/api
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
