# Desarrollo: alias de docker-compose.yml (solo Microsoft SQL Server, sin PostgreSQL).
# Uso: docker compose -f docker-compose.dev.yml up -d
# Equivale al stack principal; mantener .env con DB_* para SQL Server.

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    volumes:
      - sipra_backups:/app/backups
    environment:
      DB_TYPE: ${DB_TYPE:-mssql}
      DB_HOST: ${DB_HOST:-10.1.9.113}
      DB_PORT: ${DB_PORT:-1433}
      DB_NAME: ${DB_NAME:-Sipra-Test}
      DB_USER: ${DB_USER:-SA}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_ODBC_DRIVER: ${DB_ODBC_DRIVER:-ODBC Driver 18 for SQL Server}
      WEB_CONCURRENCY: ${WEB_CONCURRENCY:-3}
      GUNICORN_THREADS: ${GUNICORN_THREADS:-2}
      DEBUG: ${DEBUG:-1}
      SECRET_KEY: ${SECRET_KEY:-cambiar-en-produccion-clave-secreta-larga}
      ALLOWED_HOSTS: ${ALLOWED_HOSTS:-*}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "80:80"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  sipra_backups:
